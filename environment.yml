name: cometh
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.1.0
  - torchvision=0.16.0
  - cudatoolkit=12.1
  - numpy=1.24.0
  - scipy=1.11.0
  - matplotlib=3.7.0
  - astropy=5.3.0
  - scikit-learn=1.3.0
  - scikit-image=0.21.0
  - tqdm=4.65.0
  - pyyaml=6.0
  - jupyter=1.0.0
  - ipywidgets=8.0.0
  - pip
  - pip:
    - pytorch-lightning>=2.0.0  # optional, for distributed training
