# DIRTY Radiative Transfer Configuration
# Parameters used to generate all synthetic training and test data.
# DIRTY code: Gordon et al. 2001 (ApJ, 551, 269)
# These config files enable exact reproduction of all simulations.

physical_model:
  dust:
    composition: "astronomical_silicate"   # m = 1.6 + 0.01i
    grain_shape: "spherical_mie"
    size_distribution: "power_law"        # n(a) ∝ a^{-alpha}
    alpha_range: [2.0, 4.5]              # Size index range
    a_min: 0.01                           # μm, minimum grain radius
    a_max_range: [1, 100]                 # μm, maximum grain radius

  coma:
    outflow_model: "haser"                # r^{-2} radial profile
    optical_depth: "thin"                 # τ << 1 (single scattering)
    dust_velocity: "terminal_approx"      # See Eq. 14 in paper

  gas:
    species: ["CN", "C2", "NH2", "CO", "H2O"]
    fluorescence_g_factors: "ahearn95"    # A'Hearn et al. 1995
    co_h2o_range: [0.01, 2.0]
    c2_cn_range: [-0.8, -0.1]

observing_geometry:
  r_h_range: [1.0, 6.0]    # au, heliocentric distance
  delta_range: [0.5, 5.0]  # au, geocentric distance
  phase_angle_range: [0, 60]  # degrees

instrument_model:
  imaging:
    psf_fwhm: 0.7          # arcsec, matched to VLT/FORS2
    filters: ["B", "V", "R", "I"]
    read_noise: 5           # e-
    gain: 1.0               # e-/ADU
  spectroscopy:
    resolution: [5400, 8900, 5600]  # UVB, VIS, NIR (X-Shooter)
    wavelength_range: [300, 2500]   # nm
    snr_per_resolution_element: [1, 20]

stress_tests:
  test_1_galactic_plane:
    stellar_density: [50, 100]    # stars/arcmin^2
    field_location: "galactic_bulge"
  test_2_thick_coma:
    Q_d: 200                      # kg/s
    a_max: 500                    # μm
    radiative_transfer: "full"    # Multiple scattering enabled
  test_3_ultra_low_snr:
    snr_range: [0.5, 0.75, 1.0]
  test_4_missing_spectroscopy:
    spectroscopy: false
  test_5_alien_chemistry:
    co_h2o: 5.0
    dust_composition: "amorphous_carbon"  # m = 2.2 + 0.5i
  test_6_fragmentation:
    Q_d_spike_factor: 5
    alpha_shift: [3.5, 2.8]
    event_duration_hours: 24

# Non-spherical grain extension (T-matrix, proposed, not in current training)
non_spherical:
  method: "T-matrix"
  reference: "mishchenko02"
  porosity_range: [0.0, 0.5]
  fractal_dimension_range: [1.5, 3.0]
  effective_medium: "maxwell_garnett"
